services:
  gitnexus-server:
    image: ghcr.io/abhigyanpatwari/gitnexus:latest
    container_name: gitnexus-server
    ports:
      - "4747:4747"
    volumes:
      - gitnexus-data:/data/gitnexus
      - gitnexus-data:/home/node/.gitnexus
      - ${GITNEXUS_WORKSPACE:-C:/Users/larsv}:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsSI", "http://localhost:4747/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gitnexus-web:
    image: ghcr.io/abhigyanpatwari/gitnexus-web:latest
    container_name: gitnexus-web
    ports:
      - "4173:4173"
    depends_on:
      gitnexus-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gitnexus-data:
    external: true
    name: gitnexus-data
